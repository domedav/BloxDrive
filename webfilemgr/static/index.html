<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BloxDrive UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface: rgba(26, 32, 53, 0.6);
            --surface-hover: rgba(45, 55, 88, 0.8);
            --primary: #3b82f6;
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        header {
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats {
            font-size: 0.875rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Main Content */
        .container {
            flex: 1;
            padding: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .breadcrumb {
            display: flex;
            gap: 0.5rem;
            font-size: 1rem;
            align-items: center;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 4px;
        }
        
        .breadcrumb::-webkit-scrollbar { display: none; }

        .breadcrumb span {
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .breadcrumb span:hover {
            color: var(--text-main);
        }

        .breadcrumb-separator {
            color: var(--border);
        }

        .toolbar-btns {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Buttons */
        button, .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        button:hover, .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #4f8ff7 0%, #986cf7 100%);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-danger {
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #fef2f2;
        }

        /* Upload Zone Overlay */
        .upload-zone {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 2000;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            border: 4px dashed var(--primary);
        }

        .upload-zone.active {
            opacity: 1;
            pointer-events: auto;
        }

        .upload-zone input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .upload-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        /* File List */
        .file-list {
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .list-header {
            display: grid;
            grid-template-columns: 40px auto 120px 180px;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .file-item {
            display: grid;
            grid-template-columns: 40px auto 120px 180px;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.2s;
            cursor: default;
        }

        .file-item:last-child { border-bottom: none; }
        .file-item:hover { background: var(--surface-hover); }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
        }

        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--text-muted);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .item-name {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-icon {
            font-size: 1.5rem;
        }

        .item-name-text {
            cursor: pointer;
        }

        .item-name-text:hover {
            color: var(--primary);
        }

        .item-size {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .item-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .file-item:hover .item-actions {
            opacity: 1;
        }

        .action-icon {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
            padding: 0;
        }

        .action-icon:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .list-header { display: none; }
            
            .file-item {
                grid-template-columns: 40px auto;
                grid-template-rows: auto auto;
                padding: 1rem;
                gap: 0.5rem;
            }

            .item-name {
                grid-column: 2 / 3;
            }

            .item-size {
                grid-column: 2 / 3;
                font-size: 0.8rem;
                margin-left: 2.5rem; /* align with text */
            }

            .item-actions {
                grid-column: 1 / 3;
                justify-content: flex-start;
                margin-top: 0.5rem;
                opacity: 1;
                padding-left: 2.5rem;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-btns {
                justify-content: space-between;
            }
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
        }

        .modal input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .modal input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">☁️ BloxDrive</div>
        <div class="stats"><span id="fileCount">0</span> items total</div>
    </header>

    <!-- Fullscreen Drop Zone -->
    <div class="upload-zone" id="dropZone">
        <div id="uploadText" style="text-align: center;">
            <span class="upload-icon">📥</span>
            <div class="upload-text">Drop files or folders here</div>
            <div style="font-size: 0.875rem; color: var(--text-muted);">Unlimited AES-256 Encrypted Storage</div>
        </div>
        <div id="uploadProgress" style="display: none; color: var(--primary); font-weight: 600; font-size: 1.25rem; padding: 2rem 0; text-align: center;">
            <div id="uploadProgressText">Preparing upload...</div>
            <div style="width: 300px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin: 1rem auto; overflow: hidden;">
                <div id="uploadProgressBar" style="width: 0%; height: 100%; background: var(--primary-gradient); transition: width 0.2s;"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="action-bar">
            <div class="breadcrumb" id="breadcrumb">
                <span onclick="navigateTo('')">🏠 Root</span>
            </div>
            <div class="toolbar-btns">
                <input type="file" id="fileUploadInput" multiple style="display: none;" onchange="handleUpload(event.target.files)">
                <button onclick="document.getElementById('fileUploadInput').click()">
                    <span>📄</span> Upload File
                </button>
                <input type="file" id="folderUploadInput" multiple webkitdirectory directory style="display: none;" onchange="handleUpload(event.target.files)">
                <button onclick="document.getElementById('folderUploadInput').click()">
                    <span>📤</span> Upload Folder
                </button>
                <button onclick="showNewFolderModal()">
                    <span>📁</span> New Folder
                </button>
                <button onclick="downloadSelected()" id="btnDownload" style="display: none;" class="btn-primary">
                    <span>⬇️</span> Download Zip
                </button>
                <button onclick="deleteSelected()" id="btnDelete" style="display: none;" class="btn-danger">
                    <span>🗑️</span> Delete
                </button>
            </div>
        </div>

        <div class="file-list">
            <div class="list-header">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="selectAll" onclick="toggleSelectAll(this)">
                </div>
                <div>Name</div>
                <div>Size</div>
                <div style="text-align: right;">Actions</div>
            </div>
            <div id="fileListContainer">
                <!-- Rendered Items -->
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="renameModal">
        <div class="modal">
            <h2 id="renameTitle">Rename / Move</h2>
            <input type="text" id="renameInput" autocomplete="off">
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: -1rem; margin-bottom: 1.5rem;">
                Tip: Type a path with slashes (e.g. <code>folder/file.png</code>) to move it!
            </div>
            <div class="modal-actions">
                <button onclick="closeModal('renameModal')">Cancel</button>
                <button class="btn-primary" onclick="submitRename()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="folderModal">
        <div class="modal">
            <h2>New Folder</h2>
            <input type="text" id="folderInput" placeholder="Folder name" autocomplete="off">
            <div class="modal-actions">
                <button onclick="closeModal('folderModal')">Cancel</button>
                <button class="btn-primary" onclick="submitNewFolder()">Create</button>
            </div>
        </div>
    </div>

    <script>
        let allFiles = [];
        let currentPath = '';
        let selectedItems = new Set();
        
        // Modal state
        let currentRenameItem = null;
        let currentRenameIsFolder = false;

        function formatBytes(bytes) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(1))} ${sizes[i]}`;
        }

        async function fetchFiles() {
            try {
                const response = await fetch('/api/files');
                allFiles = await response.json();
                renderView();
            } catch (err) {
                document.getElementById('fileListContainer').innerHTML = 
                    '<div style="padding: 3rem; text-align: center; color: var(--danger);">Connection lost.</div>';
            }
        }

        function navigateTo(path) {
            currentPath = path;
            selectedItems.clear();
            document.getElementById('selectAll').checked = false;
            updateSelectionButtons();
            renderView();
        }

        function renderView() {
            // Update breadcrumbs
            const bc = document.getElementById('breadcrumb');
            let bcHtml = '<span onclick="navigateTo(\'\')">🏠 Root</span>';
            if (currentPath !== '') {
                const parts = currentPath.split('/');
                let accum = '';
                parts.forEach(p => {
                    accum += (accum === '' ? p : '/' + p);
                    bcHtml += `<span class="breadcrumb-separator">/</span><span onclick="navigateTo('${accum}')">${p}</span>`;
                });
            }
            bc.innerHTML = bcHtml;

            // Process items
            const files = [];
            const folders = new Set();
            
            const prefix = currentPath === '' ? '' : currentPath + '/';
            
            allFiles.forEach(f => {
                if (f.filename.startsWith(prefix)) {
                    const remainder = f.filename.substring(prefix.length);
                    const slashIdx = remainder.indexOf('/');
                    if (slashIdx === -1) {
                        if (f.size > 0 || remainder !== '.keep') {
                            files.push({ ...f, displayName: remainder });
                        }
                    } else {
                        folders.add(remainder.substring(0, slashIdx));
                    }
                }
            });

            document.getElementById('fileCount').textContent = files.length + folders.size;

            const container = document.getElementById('fileListContainer');
            if (files.length === 0 && folders.size === 0) {
                container.innerHTML = `
                    <div style="padding: 4rem 2rem; text-align: center; color: var(--text-muted);">
                        <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">📭</div>
                        <div>This folder is empty. Drop files above to upload!</div>
                    </div>`;
                return;
            }

            let html = '';
            
            // Render folders
            Array.from(folders).sort().forEach(folderName => {
                const targetPath = currentPath === '' ? folderName : currentPath + '/' + folderName;
                const isSelected = selectedItems.has('folder:' + folderName);
                
                html += `
                    <div class="file-item">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('folder:${folderName}')">
                        </div>
                        <div class="item-name">
                            <span class="item-icon">📁</span>
                            <span class="item-name-text" onclick="navigateTo('${targetPath}')">${folderName}</span>
                        </div>
                        <div class="item-size">-</div>
                        <div class="item-actions">
                            <button class="action-icon" onclick="openRenameModal('${folderName}', true)" title="Rename">✏️</button>
                            <button class="action-icon" onclick="downloadFolder('${folderName}')" title="Download Zip">⬇️</button>
                        </div>
                    </div>
                `;
            });

            // Render files
            files.sort((a,b) => a.displayName.localeCompare(b.displayName)).forEach(f => {
                const isSelected = selectedItems.has('file:' + f.filename);
                html += `
                    <div class="file-item">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect('file:${f.filename}')">
                        </div>
                        <div class="item-name">
                            <span class="item-icon">📄</span>
                            <span class="item-name-text">${f.displayName}</span>
                        </div>
                        <div class="item-size">${formatBytes(f.size)}</div>
                        <div class="item-actions">
                            <button class="action-icon" onclick="openRenameModal('${f.displayName}', false, '${f.filename}')" title="Rename">✏️</button>
                            <a href="/api/download/${encodeURIComponent(f.filename)}" class="action-icon" title="Download" download>⬇️</a>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Selection Logic
        function toggleSelect(id) {
            if (selectedItems.has(id)) selectedItems.delete(id);
            else selectedItems.add(id);
            updateSelectionButtons();
        }

        function toggleSelectAll(checkbox) {
            selectedItems.clear();
            if (checkbox.checked) {
                const prefix = currentPath === '' ? '' : currentPath + '/';
                const folders = new Set();
                allFiles.forEach(f => {
                    if (f.filename.startsWith(prefix)) {
                        const remainder = f.filename.substring(prefix.length);
                        const slashIdx = remainder.indexOf('/');
                        if (slashIdx === -1) {
                            if (f.size > 0 || remainder !== '.keep') selectedItems.add('file:' + f.filename);
                        } else {
                            selectedItems.add('folder:' + remainder.substring(0, slashIdx));
                        }
                    }
                });
            }
            updateSelectionButtons();
            renderView();
        }

        function updateSelectionButtons() {
            const btnDownload = document.getElementById('btnDownload');
            const btnDelete = document.getElementById('btnDelete');
            
            if (selectedItems.size > 0) {
                btnDownload.style.display = 'inline-flex';
                btnDelete.style.display = 'inline-flex';
            } else {
                btnDownload.style.display = 'none';
                btnDelete.style.display = 'none';
            }
        }

        // Actions
        async function deleteSelected() {
            if (!confirm('Are you sure you want to delete the selected items?')) return;
            
            const promises = [];
            for (const item of selectedItems) {
                if (item.startsWith('file:')) {
                    promises.push(fetch(`/api/delete/${encodeURIComponent(item.substring(5))}`, { method: 'DELETE' }));
                } else if (item.startsWith('folder:')) {
                    const folderName = item.substring(7);
                    const folderPath = currentPath === '' ? folderName : currentPath + '/' + folderName;
                    promises.push(fetch(`/api/delete/${encodeURIComponent(folderPath)}?is_folder=true`, { method: 'DELETE' }));
                }
            }
            
            await Promise.all(promises);
            selectedItems.clear();
            document.getElementById('selectAll').checked = false;
            updateSelectionButtons();
            fetchFiles();
        }

        async function downloadSelected() {
            const items = [];
            for (const item of selectedItems) {
                if (item.startsWith('file:')) items.push({ name: item.substring(5), is_folder: false });
                else if (item.startsWith('folder:')) {
                    const folderPath = currentPath === '' ? item.substring(7) : currentPath + '/' + item.substring(7);
                    items.push({ name: folderPath, is_folder: true });
                }
            }
            triggerZipDownload(items);
        }

        async function downloadFolder(folderName) {
            const folderPath = currentPath === '' ? folderName : currentPath + '/' + folderName;
            triggerZipDownload([{ name: folderPath, is_folder: true }]);
        }

        async function triggerZipDownload(items) {
            try {
                const response = await fetch('/api/download_zip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = "BloxDrive_Archive.zip";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("Failed to create ZIP archive.");
                }
            } catch (err) {
                alert("Error downloading ZIP.");
            }
        }

        // Modals
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function showNewFolderModal() {
            document.getElementById('folderInput').value = '';
            openModal('folderModal');
            setTimeout(() => document.getElementById('folderInput').focus(), 100);
        }

        async function submitNewFolder() {
            const name = document.getElementById('folderInput').value.trim();
            if (!name) return;
            
            const path = currentPath === '' ? name : currentPath + '/' + name;
            await fetch('/api/create_folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path })
            });
            
            closeModal('folderModal');
            fetchFiles();
        }

        function openRenameModal(displayName, isFolder, fullFilename = '') {
            currentRenameItem = isFolder ? displayName : fullFilename;
            currentRenameIsFolder = isFolder;
            
            document.getElementById('renameTitle').textContent = isFolder ? 'Rename Folder' : 'Rename File';
            document.getElementById('renameInput').value = displayName;
            openModal('renameModal');
            setTimeout(() => document.getElementById('renameInput').focus(), 100);
        }

        async function submitRename() {
            const newName = document.getElementById('renameInput').value.trim();
            if (!newName) return;
            
            let oldPath = currentRenameItem;
            let newPath = newName;
            
            if (currentRenameIsFolder) {
                oldPath = currentPath === '' ? currentRenameItem : currentPath + '/' + currentRenameItem;
                // Since it's a folder rename, if they just type a name, keep it in current path
                // If they type a slash, treat it as an absolute path move
                if (!newName.includes('/')) {
                    newPath = currentPath === '' ? newName : currentPath + '/' + newName;
                }
            } else {
                // currentRenameItem is full filename
                oldPath = currentRenameItem;
                // If they just type a name without slashes, keep it in the current path
                if (!newName.includes('/')) {
                    newPath = currentPath === '' ? newName : currentPath + '/' + newName;
                }
            }
            
            await fetch('/api/rename', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    old_name: oldPath,
                    new_name: newPath,
                    is_folder: currentRenameIsFolder
                })
            });
            
            closeModal('renameModal');
            fetchFiles();
        }

        // Upload Logic
        const dropZone = document.getElementById('dropZone');
        const uploadText = document.getElementById('uploadText');
        const uploadProgress = document.getElementById('uploadProgress');

        let dragCounter = 0;
        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            dropZone.classList.add('active');
        });
        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                dropZone.classList.remove('active');
            }
        });
        window.addEventListener('dragover', (e) => { e.preventDefault(); });
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropZone.classList.remove('active');
            handleUpload(e.dataTransfer.files);
        });

        async function handleUpload(files) {
            if (!files || files.length === 0) return;
            
            // Show processing screen on the overlay
            dropZone.classList.add('active');
            uploadText.style.display = 'none';
            uploadProgress.style.display = 'block';
            
            const total = files.length;
            let completed = 0;
            const progressText = document.getElementById('uploadProgressText');
            const progressBar = document.getElementById('uploadProgressBar');
            
            progressText.textContent = `Uploading 0 of ${total} files...`;
            progressBar.style.width = '0%';
            
            let promises = [];
            
            // Note: If you upload 1000s of files, browsers handle the fetch queue automatically.
            for (let i = 0; i < files.length; i++) {
                const f = files[i];
                let relativePath = f.webkitRelativePath || f.name;
                
                const formData = new FormData();
                formData.append('path', currentPath);
                // Override the filename with the full relative path so backend preserves folders
                formData.append('file', f, relativePath);
                
                const p = fetch('/api/upload', { method: 'POST', body: formData })
                    .then(() => {
                        completed++;
                        progressText.textContent = `Uploading ${completed} of ${total} files...`;
                        progressBar.style.width = `${(completed / total) * 100}%`;
                    })
                    .catch(() => {
                        completed++;
                        progressText.textContent = `Uploading ${completed} of ${total} files...`;
                        progressBar.style.width = `${(completed / total) * 100}%`;
                    });
                    
                promises.push(p);
            }
            
            setTimeout(fetchFiles, 2000);
            setTimeout(fetchFiles, 4000);
            setTimeout(fetchFiles, 8000);
            
            await Promise.allSettled(promises);
            fetchFiles();
            
            dropZone.classList.remove('active');
            uploadText.style.display = 'block';
            uploadProgress.style.display = 'none';
            
            const fileInp = document.getElementById('fileUploadInput');
            if (fileInp) fileInp.value = '';
            const folderInp = document.getElementById('folderUploadInput');
            if (folderInp) folderInp.value = '';
        }

        // Init
        fetchFiles();
        setInterval(fetchFiles, 5000);
    </script>
</body>
</html>

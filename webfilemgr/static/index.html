<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxDrive UI</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface);
        }

        h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-zone {
            background: var(--surface);
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-zone:hover {
            background: #233045;
        }

        .file-list {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--bg);
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #233045;
        }

        .file-info {
            flex-grow: 1;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .file-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        button, .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background 0.2s;
            text-decoration: none;
        }

        button:hover, .btn:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: var(--surface);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Notice banner */
        .notice {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--primary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☁️ BloxDrive Web</h1>
            <div class="stats">
                <span id="fileCount">0</span> files hosted
            </div>
        </header>

        <div class="notice">
            <strong>Pro Tip:</strong> Files downloaded through this interface are streamed directly from the Roblox Edge CDN and decrypted instantly in memory. They never touch the local hard drive!
        </div>

        <div class="file-list" id="fileList">
            <div class="empty-state">Loading your infinitely scalable drive...</div>
        </div>
    </div>

    <script>
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function fetchFiles() {
            try {
                const response = await fetch('/api/files');
                const files = await response.json();
                
                document.getElementById('fileCount').textContent = files.length;
                
                const list = document.getElementById('fileList');
                if (files.length === 0) {
                    list.innerHTML = '<div class="empty-state">No files yet. Drop files into the FUSE mount to upload them!</div>';
                    return;
                }

                list.innerHTML = files.map(f => `
                    <div class="file-item">
                        <div class="file-info">
                            <div class="file-name">📄 ${f.filename}</div>
                            <div class="file-meta">
                                ${formatBytes(f.size)} • Uploaded ${new Date(f.created_at).toLocaleDateString()}
                            </div>
                        </div>
                        <div class="actions">
                            <a href="/api/download/${encodeURIComponent(f.filename)}" class="btn">Download</a>
                            <button class="btn btn-danger" onclick="deleteFile('${f.filename}')">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<div class="empty-state">Failed to connect to BloxDrive backend.</div>';
            }
        }

        async function deleteFile(filename) {
            if (!confirm(`Are you sure you want to delete ${filename}?`)) return;
            
            try {
                const response = await fetch(`/api/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchFiles();
                } else {
                    alert('Failed to delete file');
                }
            } catch (err) {
                console.error(err);
                alert('Error deleting file');
            }
        }

        // Initial load
        fetchFiles();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxDrive UI</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface);
        }

        h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .upload-zone {
            background: var(--surface);
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-zone.dragover {
            background: #233045;
            border-color: #60a5fa;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer;
        }

        .breadcrumb {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            align-items: center;
        }
        .breadcrumb span {
            color: var(--text-muted);
            cursor: pointer;
        }
        .breadcrumb span:hover {
            color: var(--text);
        }

        .file-list {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .file-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--bg);
            transition: background 0.2s;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #233045;
        }

        .file-icon {
            font-size: 1.5rem;
            margin-right: 1rem;
        }

        .file-info {
            flex-grow: 1;
            cursor: pointer;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 0.25rem;
            font-size: 1rem;
        }

        .file-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        button, .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background 0.2s;
            text-decoration: none;
        }

        button:hover, .btn:hover {
            background: var(--primary-hover);
        }

        .btn-danger {
            background: var(--surface);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .notice {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--primary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        
        .upload-progress {
            display: none;
            margin-top: 1rem;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>☁️ BloxDrive</h1>
            <div class="stats">
                <span id="fileCount">0</span> items
            </div>
        </header>

        <div class="upload-zone" id="dropZone">
            <input type="file" id="fileInput" multiple>
            <div id="uploadText">
                <span style="font-size: 2rem;">📥</span><br>
                <strong>Drag and drop files here to upload</strong><br>
                <span style="font-size: 0.875rem; color: var(--text-muted);">or click to browse</span>
            </div>
            <div class="upload-progress" id="uploadProgress">Uploading... Please wait.</div>
        </div>

        <div class="breadcrumb" id="breadcrumb">
            <span onclick="navigateTo('')">🏠 Root</span>
        </div>

        <div class="file-list" id="fileList">
            <div class="empty-state">Loading your infinitely scalable drive...</div>
        </div>
    </div>

    <script>
        let allFiles = [];
        let currentPath = '';

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function fetchFiles() {
            try {
                const response = await fetch('/api/files');
                allFiles = await response.json();
                renderView();
            } catch (err) {
                document.getElementById('fileList').innerHTML = '<div class="empty-state">Failed to connect to BloxDrive backend.</div>';
            }
        }

        function navigateTo(path) {
            currentPath = path;
            renderView();
        }

        function renderView() {
            // Update breadcrumbs
            const bc = document.getElementById('breadcrumb');
            let bcHtml = '<span onclick="navigateTo(\'\')">🏠 Root</span>';
            if (currentPath !== '') {
                const parts = currentPath.split('/');
                let accum = '';
                parts.forEach(p => {
                    accum += (accum === '' ? p : '/' + p);
                    bcHtml += ` / <span onclick="navigateTo('${accum}')">${p}</span>`;
                });
            }
            bc.innerHTML = bcHtml;

            // Filter files and folders for current path
            const items = [];
            const folders = new Set();
            
            allFiles.forEach(f => {
                // If we are at 'folder1', file is 'folder1/file.png'
                // Or file is 'folder1/folder2/file.png'
                const prefix = currentPath === '' ? '' : currentPath + '/';
                if (f.filename.startsWith(prefix)) {
                    const remainder = f.filename.substring(prefix.length);
                    const slashIdx = remainder.indexOf('/');
                    if (slashIdx === -1) {
                        // It's a file in this folder
                        items.push({ type: 'file', ...f, displayName: remainder });
                    } else {
                        // It's a folder
                        folders.add(remainder.substring(0, slashIdx));
                    }
                }
            });

            const list = document.getElementById('fileList');
            if (items.length === 0 && folders.size === 0) {
                list.innerHTML = '<div class="empty-state">This folder is empty. Drag files above to upload!</div>';
                document.getElementById('fileCount').textContent = 0;
                return;
            }

            document.getElementById('fileCount').textContent = items.length + folders.size;

            let html = '';
            
            // Render folders
            Array.from(folders).sort().forEach(folderName => {
                const targetPath = currentPath === '' ? folderName : currentPath + '/' + folderName;
                html += `
                    <div class="file-item">
                        <div class="file-icon">📁</div>
                        <div class="file-info" onclick="navigateTo('${targetPath}')">
                            <div class="file-name">${folderName}</div>
                            <div class="file-meta">Folder</div>
                        </div>
                    </div>
                `;
            });

            // Render files
            items.sort((a,b) => a.displayName.localeCompare(b.displayName)).forEach(f => {
                html += `
                    <div class="file-item">
                        <div class="file-icon">📄</div>
                        <div class="file-info">
                            <div class="file-name">${f.displayName}</div>
                            <div class="file-meta">
                                ${formatBytes(f.size)} • Uploaded ${new Date(f.created_at).toLocaleDateString()}
                            </div>
                        </div>
                        <div class="actions">
                            <a href="/api/download/${encodeURIComponent(f.filename)}" class="btn">Download</a>
                            <button class="btn btn-danger" onclick="deleteFile('${f.filename}')">Delete</button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        async function deleteFile(filename) {
            if (!confirm(`Are you sure you want to delete ${filename}?`)) return;
            try {
                const response = await fetch(`/api/delete/${encodeURIComponent(filename)}`, { method: 'DELETE' });
                if (response.ok) {
                    fetchFiles();
                } else {
                    alert('Failed to delete file');
                }
            } catch (err) {
                alert('Error deleting file');
            }
        }

        // Upload functionality
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadProgress = document.getElementById('uploadProgress');
        const uploadText = document.getElementById('uploadText');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleUpload(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleUpload(e.target.files);
        });

        async function handleUpload(files) {
            if (files.length === 0) return;
            
            uploadText.style.display = 'none';
            uploadProgress.style.display = 'block';
            
            // Just upload them asynchronously
            let promises = [];
            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('path', currentPath);
                formData.append('file', files[i]);
                promises.push(fetch('/api/upload', { method: 'POST', body: formData }));
            }
            
            uploadProgress.textContent = "Processing upload in background! Files will appear momentarily.";
            
            // Trigger fetch files occasionally to update list when background finishes
            setTimeout(fetchFiles, 2000);
            setTimeout(fetchFiles, 5000);
            setTimeout(fetchFiles, 10000);
            
            setTimeout(() => {
                uploadText.style.display = 'block';
                uploadProgress.style.display = 'none';
                fileInput.value = '';
            }, 3000);
        }

        // Initial load
        fetchFiles();
        setInterval(fetchFiles, 10000); // Polling for background updates
    </script>
</body>
</html>
